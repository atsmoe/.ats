async function loadTimelineData(worldId) {
  const wid = worldId || currentWorldId || 'arknights';
  if (timelineData && currentWorldId === wid) return timelineData;

  // Try fetch by world ID
  const urlMap = { arknights: '/data/arknights.json', wh40k: '/data/wh40k.json' };
  const url = urlMap[wid];
  if (url) {
    try {
      const resp = await fetch(url);
      if (resp.ok) {
        timelineData = await resp.json();
        currentWorldId = wid;
        console.log('Timeline data loaded from', url, ':', timelineData.eras.length, 'eras,',
          timelineData.eras.reduce((s,e) => s + e.events.length, 0), 'events');
        return timelineData;
      }
    } catch (e) {
      console.log('Fetch failed for', url, ':', e.message);
    }
  }

  // Fallback to embedded data
  console.log('Using embedded data for world:', wid);
  const worldEmbedded = { arknights: EMBEDDED_DATA, wh40k: WH40K_DATA };
  timelineData = worldEmbedded[wid] || EMBEDDED_DATA;
  currentWorldId = wid;
  return timelineData;
}

/* ── Date parsing for sorting ── */
function dateSortVal(dateRaw) {
  if (!dateRaw) return 99999999;
  if (dateRaw.startsWith('???-')) {
    const m = dateRaw.match(/(\d+)/);
    return m ? -parseInt(m[1]) : 0;
  }
  if (dateRaw.startsWith('~+')) return 99990000 + parseFloat(dateRaw.substring(2)) * 100;
  if (dateRaw.startsWith('约纪元前')) {
    const m = dateRaw.match(/(\d+)/);
    return m ? -parseInt(m[1]) : -5000;
  }
  if (dateRaw.startsWith('约')) {
    const m = dateRaw.match(/(\d+)/);
    return m ? parseInt(m[1]) : 9000;
  }
  const parts = dateRaw.split('.');
  let v = 0;
  for (let i = 0; i < 3; i++) v = v * 100 + (parseInt(parts[i]) || 0);
  return v || 99990000;
}

function eraLabel(era) {
  // Strip parenthetical annotations like "（约...）"
  let t = era.title.replace(/[（(][^)）]*[)）]/g, '').trim();
  if (t.includes('纪元前')) return '【纪元前】';
  if (t.includes('遥远') || t.includes('未来')) return '【遥远的未来】';
  if (t.includes('黑暗千年')) return '【黑暗千年】';
  // WH40K: M-format like M41
  const mM = t.match(/M(\d+)/);
  if (mM) return '【帝国历 M' + mM[1] + '】';
  const m = t.match(/(\d{4})/);
  if (m) return '【泰拉历 ' + m[1] + '年】';
  return '【' + t + '】';
}

function getBranchEvents(branchId) {
  if (!timelineData) return [];
  if (branchId === 'mainline') {
    return timelineData.eras.map(era => ({
      type: 'era',
      eraTitle: eraLabel(era),
      events: era.events,  // trust JSON order (already sorted)
    }));
  }
  // IF branch — check top-level and sub-branches
  let branchDef = timelineData.subEntities[0].timeline.branches.find(b => b.id === branchId);
  if (!branchDef) {
    // Search in subBranches of integrated strategy group
    const integrated = timelineData.subEntities[0].timeline.branches.find(b => b.id === 'if-integrated');
    if (integrated && integrated.subBranches) {
      branchDef = integrated.subBranches.find(sb => sb.id === branchId);
    }
  }
  if (!branchDef) return [];

  const groups = [];

  // Branch header with description
  groups.push({
    type: 'branch-header',
    eraTitle: '◇ ' + branchDef.name,
    events: [{
      id: 'branch-' + branchId,
      dateDisplay: 'IF · ' + (branchDef.type || 'branch'),
      title: '世界线分叉',
      description: branchDef.description,
      isBranchNotice: true,
    }],
  });

  // IF endings as event cards
  if (branchDef.endings && branchDef.endings.length > 0) {
    groups.push({
      type: 'if-endings',
      eraTitle: '结局分支（' + branchDef.endings.length + '个）',
      events: branchDef.endings.map(e => ({
        id: branchId + '-ending-' + e.endingNumber,
        dateDisplay: '结局 ' + e.endingNumber,
        title: e.title,
        description: e.description,
        location: e.location,
        characters: e.characters || [],
        tags: [branchDef.type || 'IF', '结局'],
        isEnding: true,
        conditions: e.conditions,
      })),
    });
  }

  return groups;
}

/* ============================================================
   Branch Switching
   ============================================================ */
/* ── Main branch tabs ── */
document.getElementById('tl-branches').addEventListener('click', (e) => {
  if (!e.target.classList.contains('tl-branch-tab')) return;
  if (e.target.classList.contains('switching')) return;
  const branch = e.target.dataset.branch;
  if (branch === currentBranch) return;

  tlContainer.style.opacity = '0';
  tlContainer.style.transition = 'opacity 0.2s ease';

  setTimeout(() => {
    document.querySelectorAll('.tl-branch-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    e.target.classList.remove('switching');

    currentBranch = branch;
    currentSubBranch = null;
    updateSubTabs();

    if (branch === 'if-integrated') {
      // Auto-select first sub-branch
      const firstSub = document.querySelector('.tl-sub-tab');
      if (firstSub) {
        currentSubBranch = firstSub.dataset.branch;
        firstSub.classList.add('active');
      }
    }

    renderEvents(currentSubBranch || currentBranch);
    tlContainer.style.opacity = '1';
  }, 200);
});

/* ── Sub-branch tabs ── */
document.getElementById('tl-sub-branches').addEventListener('click', (e) => {
  if (!e.target.classList.contains('tl-sub-tab')) return;
  const branch = e.target.dataset.branch;

  tlContainer.style.opacity = '0';
  tlContainer.style.transition = 'opacity 0.2s ease';

  setTimeout(() => {
    document.querySelectorAll('.tl-sub-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentSubBranch = branch;
    renderEvents(branch);
    tlContainer.style.opacity = '1';
  }, 200);
});

/* ============================================================
   3D Card Tilt
   ============================================================ */
document.addEventListener('mousemove', (e) => {
  const cards = document.querySelectorAll('.event-card:hover');
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const rx = (e.clientY - cy) / (rect.height / 2) * -8;
    const ry = (e.clientX - cx) / (rect.width / 2) * 8;
    card.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.02,1.02,1.02)`;
  });
});

document.addEventListener('mouseover', (e) => {
  const card = e.target.closest('.event-card');
  if (card) card.style.transition = 'transform 0.15s ease-out, box-shadow 0.3s, border-color 0.3s';
});

document.addEventListener('mouseout', (e) => {
  const card = e.target.closest('.event-card');
  if (card) {
    card.style.transition = 'transform 0.4s ease-out, box-shadow 0.3s, border-color 0.3s';
    card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)';
  }
});

/* ============================================================
   Reference Panel
   ============================================================ */
const overlay = document.getElementById('overlay');
const refPanel = document.getElementById('ref-panel');
const refClose = document.getElementById('ref-close');
const btnWormhole = document.getElementById('btn-wormhole');

function findEventById(id) {
  if (!timelineData) return null;
  for (const era of timelineData.eras) {
    for (const evt of era.events) {
      if (evt.id === id) return evt;
    }
  }
  return null;
}

function openRefPanel(eventId) {
  const evt = findEventById(eventId);
  if (!evt) return;

  document.getElementById('ref-world-label').textContent = '—— 明日方舟 ——';
  document.getElementById('ref-event-date').textContent = evt.dateDisplay || '';
  document.getElementById('ref-event-title').textContent = evt.title || '';
  document.getElementById('ref-event-desc').textContent = evt.description || '';

  overlay.classList.add('active');
  refPanel.classList.add('active');
}

/* Populate branch tabs from JSON data */
let currentSubBranch = null;

function populateBranchTabs() {
  if (!timelineData) return;
  const branches = timelineData.subEntities[0].timeline.branches;
  const container = document.getElementById('tl-branches');
  container.innerHTML = '';
  branches.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'tl-branch-tab' + (b.isDefault ? ' active' : '');
    btn.dataset.branch = b.id;
    btn.textContent = b.name;
    container.appendChild(btn);
  });
  currentBranch = branches.find(b => b.isDefault)?.id || 'mainline';
  currentSubBranch = null;
  updateSubTabs();
}

function updateSubTabs() {
  const subContainer = document.getElementById('tl-sub-branches');
  subContainer.innerHTML = '';
  subContainer.style.display = 'none';
  if (currentBranch !== 'if-integrated') return;

  const branches = timelineData.subEntities[0].timeline.branches;
  const integrated = branches.find(b => b.id === 'if-integrated');
  if (!integrated || !integrated.subBranches) return;

  subContainer.style.display = 'flex';
  integrated.subBranches.forEach(sb => {
    const btn = document.createElement('button');
    btn.className = 'tl-sub-tab' + (sb.status === 'pending' ? ' pending' : '');
    btn.dataset.branch = sb.id;
    btn.textContent = sb.name;
    if (sb.id === currentSubBranch) btn.classList.add('active');
    subContainer.appendChild(btn);
  });
}
function closeRefPanel() {
  overlay.classList.remove('active');
  refPanel.classList.remove('active');
}

refClose.addEventListener('click', closeRefPanel);
overlay.addEventListener('click', closeRefPanel);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeRefPanel();
});

/* ============================================================
   Wormhole Transition (simplified for prototype)
   ============================================================ */
const wormholeCanvas = document.getElementById('wormhole');
const whCtx = wormholeCanvas.getContext('2d');
let wormholeAnim = null;
let wormholeProgress = 0;

btnWormhole.addEventListener('click', () => {
  closeRefPanel();
  wormholeCanvas.classList.add('active');
  wormholeProgress = 0;
  playWormhole();
});

function playWormhole() {
  if (wormholeAnim) cancelAnimationFrame(wormholeAnim);

  function step() {
    wormholeProgress += 0.012;
    if (wormholeProgress >= 1) {
      wormholeCanvas.classList.remove('active');
      whCtx.clearRect(0, 0, W, H);
      wormholeAnim = null;
      // Simulate arriving at target world (for prototype, flash and stay)
      document.body.style.transition = 'background 0.3s';
      document.body.style.background = '#0a0a18';
      setTimeout(() => { document.body.style.background = ''; }, 300);
      return;
    }

    whCtx.clearRect(0, 0, W, H);
    const cx = W / 2, cy = H / 2;

    // Wormhole radius
    let radius;
    if (wormholeProgress < 0.3) {
      radius = wormholeProgress / 0.3 * W * 0.4;
    } else if (wormholeProgress < 0.7) {
      radius = W * 0.4;
    } else {
      radius = (1 - wormholeProgress) / 0.3 * W * 0.4;
    }

    // Draw wormhole
    const gradient = whCtx.createRadialGradient(cx, cy, radius * 0.3, cx, cy, radius);
    gradient.addColorStop(0, 'rgba(240,216,120,0.9)');
    gradient.addColorStop(0.3, 'rgba(201,160,80,0.6)');
    gradient.addColorStop(0.6, 'rgba(160,120,60,0.3)');
    gradient.addColorStop(0.85, 'rgba(8,8,16,0.1)');
    gradient.addColorStop(1, 'rgba(8,8,16,0)');
    whCtx.fillStyle = gradient;
    whCtx.fillRect(0, 0, W, H);

    // Spiral particles
    const numParticles = 60;
    const spinAngle = wormholeProgress * Math.PI * 8;
    for (let i = 0; i < numParticles; i++) {
      const angle = (i / numParticles) * Math.PI * 2 + spinAngle;
      const dist = (radius * 0.8) * (Math.sin(wormholeProgress * Math.PI) * 0.6 + 0.4);
      const px = cx + Math.cos(angle) * dist;
      const py = cy + Math.sin(angle) * dist * 0.3;
      const alpha = 1 - wormholeProgress;
      whCtx.beginPath();
      whCtx.arc(px, py, 1.5, 0, Math.PI * 2);
      whCtx.fillStyle = `rgba(240,216,120,${alpha})`;
      whCtx.fill();
    }

    wormholeAnim = requestAnimationFrame(step);
  }
  step();
}

// Resize wormhole canvas
window.addEventListener('resize', () => {
  wormholeCanvas.width = window.innerWidth;
  wormholeCanvas.height = window.innerHeight;
});

wormholeCanvas.height = window.innerHeight;
