<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>群星之间 · 编年史 — 明日方舟</title>
<!-- Fonts: use system fonts primarily, Google Fonts mirror as CDN enhancement -->
<link rel="preconnect" href="https://fonts.loli.net" crossorigin>
<link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS Custom Properties
   ============================================================ */
:root {
  --bg-deep: #080810;
  --gold: #c9a050;
  --gold-dim: #a08030;
  --gold-bright: #f0d878;
  --text: #e8dcc8;
  --text-muted: #9a9078;
  --axis: #3a3020;
  --card-bg: rgba(20, 18, 10, 0.85);
  --card-border: rgba(201, 160, 80, 0.15);
  --ark-amber: #d4923a;
  --ark-blue: #4a5568;
  --font-serif: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', 'NSimSun', 'FangSong', serif;
  --font-sans: 'Noto Sans SC', 'Source Han Sans SC', 'Microsoft YaHei', 'PingFang SC', 'Microsoft JhengHei', 'Hiragino Sans GB', sans-serif;
  --nav-h: 56px;
  --panel-w: 400px;
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: #060a14;
  color: var(--text);
  overflow-x: hidden;
  cursor: default;
}

/* Vignette overlay — cool indigo cast */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(4,6,20,0.65) 80%, rgba(2,4,16,0.9) 100%);
}

/* ============================================================
   Particle Canvas
   ============================================================ */
#particles {
  position: fixed; inset: 0; z-index: 0;
  display: block;
}

/* ============================================================
   Navigation
   ============================================================ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  background: #0e0c08;
  border-bottom: 1px solid rgba(201,160,80,0.15);
  transform: translateY(-100%);
  transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
nav.visible { transform: translateY(0); }

.nav-brand {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 4px;
}

.nav-world-link {
  color: var(--ark-amber);
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 3px;
  padding: 6px 16px;
  border: 1px solid rgba(212,146,58,0.3);
  border-radius: 3px;
  margin-left: 24px;
  transition: all 0.3s;
}
.nav-world-link:hover {
  border-color: var(--ark-amber);
  box-shadow: 0 0 12px rgba(212,146,58,0.2);
  text-shadow: 0 0 8px rgba(212,146,58,0.3);
}

.nav-links { display: flex; gap: 32px; }
.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 2px;
  transition: color 0.3s;
}
.nav-links a:hover, .nav-links a.active { color: var(--gold); }

/* ============================================================
   Star Map View — Canvas-drawn galaxies with hover/detail
   ============================================================ */
#star-map {
  position: fixed; inset: 0; z-index: 10;
  transition: opacity 0.6s, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
#star-map.hidden {
  opacity: 0; transform: scale(1.1); pointer-events: none;
}

/* Galaxy hover tooltip */
.galaxy-tooltip {
  position: fixed; z-index: 60;
  pointer-events: none;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.35s ease, transform 0.35s ease;
  background: rgba(10,10,20,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(201,160,80,0.2);
  border-radius: 6px;
  padding: 14px 20px;
  max-width: 220px;
}
.galaxy-tooltip.visible {
  opacity: 1; transform: translateY(0);
}
.galaxy-tooltip .gt-name {
  font-family: var(--font-serif);
  font-size: 18px; font-weight: 700;
  letter-spacing: 4px; color: var(--text);
}
.galaxy-tooltip .gt-sub {
  font-size: 11px; letter-spacing: 2px;
  color: var(--text-muted); margin-top: 4px;
}
.galaxy-tooltip .gt-hint {
  font-size: 10px; letter-spacing: 1px;
  color: rgba(201,160,80,0.4); margin-top: 8px;
}

/* Galaxy detail overlay */
#galaxy-detail {
  position: fixed; inset: 0; z-index: 80;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
#galaxy-detail.active { opacity: 1; pointer-events: auto; }

.detail-overlay {
  position: absolute; inset: 0;
  background: rgba(4,4,12,0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.detail-content {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center;
  gap: 16px;
  text-align: center;
}

.detail-body {
  position: relative;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, rgba(20,18,10,0.95), transparent);
  display: flex; align-items: center; justify-content: center;
}
.detail-body canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border-radius: 50%;
}

.detail-title {
  font-family: var(--font-serif);
  font-size: 36px; font-weight: 900;
  letter-spacing: 10px; color: var(--text);
}
.detail-sub {
  font-size: 13px; letter-spacing: 4px;
  color: var(--text-muted);
}
.detail-desc {
  font-size: 13px; line-height: 1.7;
  color: var(--text-muted);
  max-width: 400px;
}
.detail-calendar {
  display: inline-block;
  margin-top: 4px;
  padding: 4px 16px;
  border: 1px solid rgba(201,160,80,0.3);
  font-size: 11px; letter-spacing: 3px;
  color: var(--gold-dim);
}

.btn-detail-enter {
  margin-top: 12px;
  padding: 14px 52px;
  background: transparent;
  border: 1px solid rgba(201,160,80,0.4);
  color: var(--gold);
  font-family: var(--font-serif);
  font-size: 15px; letter-spacing: 6px;
  cursor: pointer;
  transition: all 0.4s ease;
}
.btn-detail-enter:hover {
  background: rgba(201,160,80,0.1);
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(201,160,80,0.2);
  text-shadow: 0 0 20px rgba(201,160,80,0.4);
}

.detail-close {
  position: absolute; top: 32px; right: 32px;
  width: 40px; height: 40px;
  border: 1px solid rgba(201,160,80,0.3); border-radius: 50%;
  background: transparent; color: var(--gold-dim);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  z-index: 81;
}
.detail-close:hover {
  border-color: var(--gold); color: var(--gold);
  box-shadow: 0 0 16px rgba(201,160,80,0.2);
}

/* ============================================================
   Timeline View
   ============================================================ */
#timeline {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  min-height: 100vh;
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
}
#timeline.active { opacity: 1; pointer-events: auto; }

/* Cover banner */
.tl-cover {
  width: 100%; height: 280px;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 50% 80%, rgba(212,146,58,0.08) 0%, transparent 60%),
    linear-gradient(180deg, #0d0d1a 0%, #0a0a18 100%);
}
.tl-cover::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
  background: linear-gradient(to top, var(--bg-deep), transparent);
}
.tl-cover-inner {
  position: absolute; bottom: 48px; left: 64px;
  display: flex; flex-direction: column;
}
.tl-cover h1 {
  font-family: var(--font-serif);
  font-size: 36px; font-weight: 900;
  letter-spacing: 8px;
  color: var(--text);
}
.tl-cover p {
  font-size: 14px; color: var(--text-muted);
  margin-top: 8px; max-width: 500px;
  line-height: 1.6;
}
.tl-cover .calendar-badge {
  display: inline-block;
  margin-top: 12px;
  padding: 4px 16px;
  border: 1px solid rgba(201,160,80,0.3);
  font-size: 11px; letter-spacing: 3px;
  color: var(--gold-dim);
  align-self: flex-start;
}

/* Branch tabs */
.tl-branches {
  display: flex; gap: 0;
  padding: 0 64px;
  margin-top: -1px;
  border-bottom: 1px solid rgba(201,160,80,0.15);
  background: #0e0c08;
  position: sticky; top: var(--nav-h); z-index: 30;
}
.tl-branch-tab {
  padding: 14px 28px;
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  border: none; background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.3s ease;
  position: relative;
  letter-spacing: 2px;
}
.tl-branch-tab.active {
  color: var(--gold);
  border-bottom-color: var(--ark-amber);
}
.tl-branch-tab.active::before {
  content: '●';
  font-size: 6px;
  margin-right: 8px;
  color: var(--ark-amber);
  vertical-align: middle;
}
.tl-branch-tab:not(.active)::before {
  content: '○';
  font-size: 6px;
  margin-right: 8px;
  color: var(--text-muted);
  vertical-align: middle;
}
.tl-branch-tab:hover { color: var(--gold); }

/* Loading shimmer on branch switch */
.tl-branch-tab.switching {
  pointer-events: none;
}

/* Timeline axis */
.tl-container {
  position: relative;
  padding: 60px 0 200px;
  max-width: 1100px;
  margin: 0 auto;
  transition: opacity 0.2s ease;
}

.tl-axis {
  position: absolute;
  left: 27%;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent 0%, var(--axis) 5%, var(--axis) 95%, transparent 100%);
}

/* Event cards */
.tl-event {
  position: relative;
  width: 440px;
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  /* 3D tilt */
  transform-style: preserve-3d;
  perspective: 1000px;
  will-change: transform;
}
.tl-event.visible {
  opacity: 1;
  transform: translateY(0);
}
.tl-event.left  { margin-left: calc(27% - 440px - 48px); }
.tl-event.right { margin-left: calc(27% + 48px); }

.event-card {
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 24px 28px;
  cursor: default;
  transition: box-shadow 0.3s ease, border-color 0.3s ease;
  position: relative;
}
.event-card::before {
  content: '';
  position: absolute; top: -1px; left: 24px; right: 24px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,160,80,0.2), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.event-card:hover::before { opacity: 1; }
.event-card:hover {
  border-color: rgba(201,160,80,0.3);
  box-shadow: 0 12px 48px rgba(201,160,80,0.08);
}

/* Connector line from card to axis */
.tl-event::after {
  content: '';
  position: absolute; top: 50%;
  width: 48px; height: 1px;
  background: rgba(201,160,80,0.3);
}
.tl-event.left::after  { right: -48px; }
.tl-event.right::after { left: -48px; }

/* Axis node (diamond or circle) */
.axis-node {
  position: absolute;
  left: calc(27% - 6px);
  width: 12px; height: 12px;
  background: var(--gold-dim);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(201,160,80,0.3);
  transform: translateY(-50%);
}
.axis-node.crystal {
  border-radius: 2px;
  transform: translateY(-50%) rotate(45deg);
  background: var(--ark-amber);
  box-shadow: 0 0 12px rgba(212,146,58,0.4);
}
.axis-node.diverge {
  width: 18px; height: 18px;
  left: calc(27% - 9px);
  background: transparent;
  border: 2px solid var(--ark-amber);
  border-radius: 2px;
  transform: translateY(-50%) rotate(45deg);
  box-shadow: 0 0 16px rgba(212,146,58,0.5);
  animation: diverge-pulse 2s ease-in-out infinite;
}

@keyframes diverge-pulse {
  0%, 100% { box-shadow: 0 0 16px rgba(212,146,58,0.3); }
  50% { box-shadow: 0 0 28px rgba(212,146,58,0.6); }
}

.event-card .event-date {
  font-size: 12px; color: var(--ark-amber);
  letter-spacing: 3px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.event-card .event-date .dot {
  width: 6px; height: 6px;
  background: var(--ark-amber);
  border-radius: 50%;
}

.event-card .event-title {
  font-family: var(--font-serif);
  font-size: 20px; font-weight: 700;
  color: var(--text);
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.event-card .event-desc {
  font-size: 14px; line-height: 1.7;
  color: var(--text-muted);
}

.event-card .event-img {
  width: 100%; height: 160px;
  margin-top: 14px;
  border-radius: 4px;
  background: linear-gradient(135deg, rgba(212,146,58,0.08), rgba(74,85,104,0.08));
  border: 1px solid rgba(201,160,80,0.1);
  display: flex; align-items: center; justify-content: center;
  color: rgba(201,160,80,0.3);
  font-size: 12px; letter-spacing: 2px;
}

.event-card .event-ref {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid rgba(201,160,80,0.08);
  font-size: 12px; color: var(--gold-dim);
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: color 0.3s;
}
.event-card .event-ref:hover { color: var(--gold-bright); }
.event-card .event-ref::after { content: '↗'; font-size: 10px; }

/* Diverge marker inline */
.diverge-inline {
  position: relative;
  margin: 0 0 80px calc(27% + 48px);
  padding: 16px 24px;
  border: 1px dashed rgba(212,146,58,0.25);
  border-radius: 6px;
  background: rgba(20,18,10,0.4);
  font-size: 13px; color: var(--ark-amber);
  letter-spacing: 2px;
  display: inline-flex; align-items: center; gap: 12px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.diverge-inline.visible { opacity: 1; transform: translateY(0); }
.diverge-inline .diamond {
  width: 14px; height: 14px;
  border: 2px solid var(--ark-amber);
  transform: rotate(45deg);
  animation: diverge-pulse 2s ease-in-out infinite;
}
.diverge-inline span {
  font-size: 11px; color: var(--text-muted);
}

/* ============================================================
   Reference Panel
   ============================================================ */
#overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(8,8,16,0.6);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
#overlay.active { opacity: 1; pointer-events: auto; }

#ref-panel {
  position: fixed; top: 0; right: 0; z-index: 210;
  width: var(--panel-w); height: 100vh;
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-left: 1px solid rgba(201,160,80,0.2);
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto;
}
#ref-panel.active { transform: translateX(0); }

.ref-close {
  position: absolute; top: 20px; right: 20px;
  width: 32px; height: 32px;
  border: 1px solid rgba(201,160,80,0.3); border-radius: 50%;
  background: transparent; color: var(--gold-dim);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.ref-close:hover {
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 16px rgba(201,160,80,0.2);
}

.ref-content { padding: 60px 32px 40px; }

.ref-content h2 {
  font-family: var(--font-serif);
  font-size: 14px; letter-spacing: 4px;
  color: var(--gold-dim);
  text-align: center;
  margin-bottom: 24px;
}
.ref-content h2::before { content: '◇ '; }
.ref-content h2::after  { content: ' ◇'; }

.ref-world-label {
  font-size: 11px; letter-spacing: 3px;
  color: var(--text-muted); text-align: center;
}
.ref-event-date {
  font-size: 13px; color: var(--ark-amber);
  text-align: center; margin-top: 4px;
  letter-spacing: 2px;
}
.ref-event-title {
  font-family: var(--font-serif);
  font-size: 22px; font-weight: 700;
  text-align: center; margin-top: 12px;
  color: var(--text);
}
.ref-event-desc {
  font-size: 14px; line-height: 1.7;
  color: var(--text-muted);
  margin-top: 16px;
  padding: 16px;
  border: 1px solid rgba(201,160,80,0.08);
  border-radius: 4px;
}

.ref-related {
  margin-top: 24px;
}
.ref-related h3 {
  font-size: 11px; letter-spacing: 3px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.ref-related a {
  display: block; padding: 8px 0;
  font-size: 13px; color: var(--gold-dim);
  text-decoration: none;
  border-bottom: 1px solid rgba(201,160,80,0.06);
  transition: color 0.3s;
}
.ref-related a:hover { color: var(--gold); }

.btn-wormhole {
  display: block; width: 100%;
  margin-top: 32px; padding: 14px;
  background: linear-gradient(135deg, rgba(201,160,80,0.2), rgba(160,128,48,0.1));
  border: 1px solid rgba(201,160,80,0.4);
  border-radius: 6px;
  color: var(--gold);
  font-family: var(--font-serif);
  font-size: 15px; letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-wormhole:hover {
  background: linear-gradient(135deg, rgba(201,160,80,0.3), rgba(160,128,48,0.2));
  box-shadow: 0 0 32px rgba(201,160,80,0.2);
  text-shadow: 0 0 16px rgba(201,160,80,0.4);
}

/* ============================================================
   Wormhole Transition Overlay
   ============================================================ */
#wormhole {
  position: fixed; inset: 0; z-index: 300;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
}
#wormhole.active { opacity: 1; }
#wormhole canvas { width: 100%; height: 100%; }

/* ============================================================
   Era headers, tags, meta, diverge badge
   ============================================================ */
.tl-era-header {
  display: flex; align-items: center; gap: 20px;
  margin: 60px 0 40px calc(27% - 120px);
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.tl-era-header.visible { opacity: 1; transform: translateY(0); }
.tl-era-header .era-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,160,80,0.25), transparent);
}
.tl-era-header .era-title {
  font-family: var(--font-serif);
  font-size: 16px; letter-spacing: 4px;
  color: var(--gold-dim);
  white-space: nowrap;
}

.event-meta {
  font-size: 11px; color: rgba(201,160,80,0.35);
  margin-bottom: 10px; letter-spacing: 1px;
}

.event-tags { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.event-tag {
  font-size: 10px; letter-spacing: 1px;
  padding: 3px 10px;
  border: 1px solid rgba(201,160,80,0.15);
  border-radius: 3px;
  color: var(--text-muted);
}

.event-diverge-badge {
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid rgba(212,146,58,0.2);
  font-size: 11px; color: var(--ark-amber);
  display: flex; align-items: center; gap: 8px;
  letter-spacing: 1px;
}

.event-conditions {
  margin-top: 10px; padding: 10px 12px;
  background: rgba(8,8,16,0.4);
  border-left: 2px solid rgba(201,160,80,0.3);
  font-size: 11px; color: rgba(201,160,80,0.5);
  line-height: 1.6; letter-spacing: 1px;
}
.event-conditions .cond-icon {
  color: var(--ark-amber); font-size: 8px; margin-right: 4px;
}

/* Ending event cards */
.tl-event.if-ending .event-card {
  border-color: rgba(212,146,58,0.3);
}
.tl-event.if-ending .event-card .event-date {
  color: var(--ark-amber);
  font-family: var(--font-serif);
  letter-spacing: 3px;
}

/* Branch tabs scrollable */
.tl-branches {
  overflow-x: auto; white-space: nowrap;
  -ms-overflow-style: none; scrollbar-width: none;
}
.tl-branches::-webkit-scrollbar { display: none; }

/* Sub-branch tabs (second row for integrated strategy) */
.tl-sub-branches {
  display: flex; gap: 0; overflow-x: auto;
  padding: 0 64px; margin-top: 0;
  border-bottom: 1px solid rgba(201,160,80,0.1);
  background: #0b0906;
  position: sticky; top: calc(var(--nav-h) + 48px); z-index: 29;
  scrollbar-width: none;
}
.tl-sub-branches::-webkit-scrollbar { display: none; }

.tl-sub-tab {
  padding: 10px 22px; font-size: 12px; letter-spacing: 1px;
  color: var(--text-muted); cursor: pointer; border: none;
  background: none; border-bottom: 2px solid transparent;
  transition: all 0.3s ease; font-family: var(--font-sans);
  white-space: nowrap;
}
.tl-sub-tab.active { color: var(--ark-amber); border-bottom-color: var(--ark-amber); }
.tl-sub-tab:hover { color: var(--gold); }
.tl-sub-tab.pending { color: rgba(201,160,80,0.3); font-style: italic; }
.tl-sub-tab.pending::after { content: ' [待完工]'; font-size: 9px; color: rgba(201,160,80,0.3); }
.diamond-small {
  display: inline-block;
  width: 8px; height: 8px;
  border: 1px solid var(--ark-amber);
  transform: rotate(45deg);
}

/* Concurrent events — smaller, muted */
.tl-event.concurrent .event-card {
  opacity: 0.7;
  border-style: dashed;
}
.tl-event.concurrent .event-card .event-title { font-size: 16px; }

/* Key events — more prominent */
.tl-event.key-event .event-card {
  border-color: rgba(212,146,58,0.35);
  box-shadow: 0 8px 32px rgba(212,146,58,0.06);
}

/* ============================================================
   Scroll hint
   ============================================================ */
.scroll-hint {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  z-index: 30;
  font-size: 11px; letter-spacing: 3px;
  color: rgba(201,160,80,0.4);
  animation: hint-fade 3s ease-in-out infinite;
  pointer-events: none;
  transition: opacity 0.5s;
}
@keyframes hint-fade {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* ============================================================
   Era sidebar navigation — minimal year dots on the left edge
   ============================================================ */
#era-nav {
  position: fixed; left: 8px; top: 50%; transform: translateY(-50%);
  z-index: 50;
  display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
  width: 12px;
  pointer-events: none; opacity: 0;
  background: none;
  transition: opacity 0.4s ease;
}
#era-nav.active { pointer-events: auto; opacity: 1; }

.era-nav-dot {
  display: flex; align-items: center; justify-content: center;
  width: 12px; height: 12px;
  cursor: pointer;
  text-decoration: none;
  position: relative;
  transition: all 0.2s ease;
  background: none;
  outline: none;
}
.era-nav-dot .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(201,160,80,0.3);
  transition: all 0.3s ease;
  flex-shrink: 0;
}
/* Year label — hidden by default, shown on hover */
.era-nav-dot .label {
  position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
  font-size: 9px; letter-spacing: 1.5px;
  color: rgba(201,160,80,0);
  white-space: nowrap;
  transition: color 0.3s ease;
  pointer-events: none;
}
.era-nav-dot:hover .dot { background: rgba(201,160,80,0.6); box-shadow: 0 0 8px rgba(201,160,80,0.4); width: 7px; height: 7px; }
.era-nav-dot:hover { background: none; }
.era-nav-dot:hover .label { color: rgba(201,160,80,0.7); }
.era-nav-dot.current .dot {
  width: 8px; height: 8px;
  background: var(--ark-amber);
  box-shadow: 0 0 12px rgba(212,146,58,0.6);
}
/* Current era label always visible */
.era-nav-dot.current .label,
.era-nav-dot:first-child .label,
.era-nav-dot:last-child .label { color: rgba(201,160,80,0.4); }

/* ============================================================
   Back to top button
   ============================================================ */
#back-to-top {
  position: fixed; bottom: 32px; right: 32px; z-index: 50;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(201,160,80,0.3);
  background: rgba(8,8,16,0.8);
  backdrop-filter: blur(8px);
  color: var(--gold-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}
#back-to-top.visible { opacity: 1; pointer-events: auto; }
#back-to-top:hover {
  border-color: var(--gold);
  box-shadow: 0 0 16px rgba(201,160,80,0.2);
  color: var(--gold);
}

/* ============================================================
   Reduced motion
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<script>
/* ============================================================
   Background Engine — pluggable per-view/per-world backgrounds
   Supports: particles (now), video / image (future stubs)
   ============================================================ */

/* ── Background Presets ── */
const BG_PRESETS = {
  'star-map': {
    type: 'particles',
    description: 'DSP-style cold galaxy — indigo/cyan/purple',
    stars: 800,
    nebulaCount: 7,
    starColorMix: { cool: 0.82, neutral: 0.13, warm: 0.05 },
    nebulaPalette: [
      [30, 40, 100], [50, 30, 120], [20, 80, 140],
      [80, 20, 100], [100, 30, 130], [10, 60, 110], [60, 50, 140],
    ],
    coreGlow: { r: 60, g: 40, b: 150, alpha: 0.05, sizeRatio: 0.6 },
    baseBackground: '#060a14',
  },
  'arknights': {
    type: 'particles',
    description: 'Arknights amber — warm gold/amber/brown nebulas on deep space',
    stars: 500,
    nebulaCount: 5,
    starColorMix: { cool: 0.35, neutral: 0.35, warm: 0.30 },
    nebulaPalette: [
      [180, 130, 70], [160, 110, 50], [200, 160, 90],
      [140, 100, 60], [120, 90, 80], [170, 140, 100],
    ],
    coreGlow: { r: 212, g: 146, b: 58, alpha: 0.04, sizeRatio: 0.5 },
    baseBackground: '#080810',
  },
  'wh40k': {
    type: 'particles',
    description: 'Warhammer 40K — gothic crimson/bone/gold on abyssal void',
    stars: 600,
    nebulaCount: 6,
    starColorMix: { cool: 0.20, neutral: 0.30, warm: 0.50 },
    nebulaPalette: [
      [140, 30, 30], [180, 50, 40], [200, 160, 90],
      [100, 20, 20], [60, 40, 50], [160, 130, 80],
    ],
    coreGlow: { r: 200, g: 160, b: 80, alpha: 0.03, sizeRatio: 0.4 },
    baseBackground: '#060608',
  },
};

/* ── Utility ── */
function gaussRand(mean, stdev) {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return mean + stdev * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function starColor(colorTemp, alpha) {
  const r = Math.round(140 + colorTemp * 100);
  const g = Math.round(160 + colorTemp * 40);
  const b = Math.round(210 - colorTemp * 100);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ═══════════════════════════════════════════════════════════
   ParticleBackground — Canvas-based star field
   ═══════════════════════════════════════════════════════════ */
class ParticleBackground {
  constructor(canvas, preset) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.stars = [];
    this.nebulae = [];
    this.time = 0;
    this.mouse = { x: -1000, y: -1000, tx: -1000, ty: -1000 };
    this.animId = null;

    this._onMouse = (e) => { this.mouse.tx = e.clientX; this.mouse.ty = e.clientY; };
    this._onResize = () => this._resize();
    window.addEventListener('mousemove', this._onMouse);
    window.addEventListener('resize', this._onResize);

    this.loadPreset(preset);
    this._resize();
    this._start();

    // Initialize galaxy stars
    this.galaxyStars = {};
    for (const [gid, g] of Object.entries(GALAXIES)) {
      const stars = [];
      const rng = (() => { let s = gid === 'arknights' ? 42 : 137; return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; }; })();
      if (g.armCount > 0) {
        for (let arm = 0; arm < g.armCount; arm++) {
          const baseAngle = (arm / g.armCount) * Math.PI * 2;
          for (let i = 0; i < g.armStars / g.armCount; i++) {
            const dist = (rng() * 0.9 + 0.1) * g.armMaxR;
            const angle = baseAngle + (dist / g.armMaxR) * g.armSpiral * Math.PI * 2 + (rng() - 0.5) * 0.8;
            const scatter = (rng() - 0.5) * g.armWidth * 2;
            stars.push({ r: dist, theta: angle, scatter, brightness: rng(),
              colorTemp: rng() < g.warmBias ? 0.4 + rng() * 0.6 : rng() * 0.4,
              size: 0.3 + rng() * 1.8, twinklePhase: rng() * Math.PI * 2, twinkleSpeed: 0.2 + rng() * 2 });
          }
        }
      } else {
        const clumpCount = 5;
        for (let c = 0; c < clumpCount; c++) {
          const clumpR = rng() * g.armMaxR;
          const clumpAngle = rng() * Math.PI * 2;
          for (let i = 0; i < g.armStars / clumpCount; i++) {
            stars.push({ r: clumpR + (rng() - 0.5) * g.armWidth * 1.5,
              theta: clumpAngle + (rng() - 0.5) * 0.8,
              scatter: 0, brightness: rng(),
              colorTemp: rng() < 0.3 ? 0.6 + rng() * 0.4 : rng() * 0.5,
              size: 0.3 + rng() * 1.5, twinklePhase: rng() * Math.PI * 2, twinkleSpeed: 0.2 + rng() * 2,
              clumpExtra: true, clumpExtraR: (rng() - 0.5) * g.armWidth * 1.5, clumpExtraA: (rng() - 0.5) * 0.8 });
          }
        }
      }
      this.galaxyStars[gid] = stars;
    }
  }

  _resize() {
    this.W = this.canvas.width = window.innerWidth;
    this.H = this.canvas.height = window.innerHeight;
    this._rebuildNebulae();
    this._rebuildStars();
  }

  /* ── Nebula textures ── */
  _createNebulaTexture(size, palette) {
    const oc = document.createElement('canvas');
    oc.width = oc.height = size;
    const octx = oc.getContext('2d');
    const blobCount = 8 + Math.floor(Math.random() * 8);
    for (let i = 0; i < blobCount; i++) {
      const cx = size * (0.15 + Math.random() * 0.7);
      const cy = size * (0.15 + Math.random() * 0.7);
      const r = size * (0.12 + Math.random() * 0.4);
      const c = palette[Math.floor(Math.random() * palette.length)];
      const alpha = 0.025 + Math.random() * 0.065;
      const g = octx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${alpha})`);
      g.addColorStop(0.4, `rgba(${c[0]},${c[1]},${c[2]},${alpha * 0.6})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      octx.fillStyle = g;
      octx.fillRect(0, 0, size, size);
    }
    return oc;
  }

  _rebuildNebulae() {
    this.nebulae.length = 0;
    const count = this.preset.nebulaCount;
    for (let i = 0; i < count; i++) {
      const size = Math.max(this.W, this.H) * (0.8 + Math.random() * 1.2);
      this.nebulae.push({
        texture: this._createNebulaTexture(Math.ceil(size), this.preset.nebulaPalette),
        x: -size * 0.2 + Math.random() * (this.W + size * 0.4),
        y: -size * 0.2 + Math.random() * (this.H + size * 0.4),
        vx: (Math.random() - 0.5) * 0.04,
        vy: (Math.random() - 0.5) * 0.03,
        size,
        alpha: 0.4 + Math.random() * 0.6,
      });
    }
  }

  /* ── Stars ── */
  _edgeFade(x, y) {
    const m = 0.12;
    const fx = Math.min(1, x / (this.W * m), (this.W - x) / (this.W * m));
    const fy = Math.min(1, y / (this.H * m), (this.H - y) / (this.H * m));
    return Math.min(1, fx * fy);
  }

  _rebuildStars() {
    this.stars.length = 0;
    const mix = this.preset.starColorMix;
    const coreX = this.W * 0.48;
    const coreY = this.H * 0.44;

    for (let i = 0; i < this.preset.stars; i++) {
      let x, y;
      const type = Math.random();

      if (type < 0.25) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.abs(gaussRand(0, Math.min(this.W, this.H) * 0.12));
        x = coreX + Math.cos(angle) * dist;
        y = coreY + Math.sin(angle) * dist * 0.7;
      } else if (type < 0.65) {
        const armIndex = Math.floor(Math.random() * 3);
        const baseAngle = (armIndex / 3) * Math.PI * 2 - 0.5;
        const maxDist = Math.max(this.W, this.H) * 0.75;
        const distFromCore = Math.random() * maxDist;
        const spiralAngle = baseAngle + (distFromCore / maxDist) * 5.5;
        const scatter = gaussRand(0, 80 + distFromCore * 0.6);
        const armAngle = spiralAngle + (scatter / (distFromCore + 10)) * 0.4;
        x = coreX + Math.cos(armAngle) * distFromCore;
        y = coreY + Math.sin(armAngle) * distFromCore * 0.55;
        x += (Math.random() - 0.5) * 120;
        y += (Math.random() - 0.5) * 80;
      } else {
        x = -this.W * 0.15 + Math.random() * this.W * 1.3;
        y = -this.H * 0.15 + Math.random() * this.H * 1.3;
      }

      x = Math.max(-60, Math.min(this.W + 60, x));
      y = Math.max(-60, Math.min(this.H + 60, y));

      const brightness = Math.pow(Math.random(), 3.5);
      const cr = Math.random();
      const colorTemp = cr < mix.cool
        ? Math.random() * 0.3
        : cr < mix.cool + mix.neutral
          ? 0.3 + Math.random() * 0.35
          : 0.65 + Math.random() * 0.35;

      this.stars.push({
        x, y,
        radius: 0.25 + brightness * 2.5,
        brightness,
        colorTemp,
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.15 + Math.random() * 3.5,
        twinkleAmp: 0.05 + Math.random() * 0.4,
        vx: (Math.random() - 0.5) * 0.02,
        vy: (Math.random() - 0.5) * 0.02,
      });
    }
    this.stars.sort((a, b) => a.brightness - b.brightness);
  }

  /* ── Rendering ── */
  _drawStarGlow(sx, sy, radius, brightness, colorTemp) {
    const ctx = this.ctx;
    for (let i = 3; i >= 0; i--) {
      const r = radius * (1 + i * 2.8);
      const a = brightness * 0.10 * (1 - i * 0.23);
      if (a < 0.005) continue;
      const g = ctx.createRadialGradient(sx, sy, radius * 0.4, sx, sy, r);
      g.addColorStop(0, starColor(colorTemp, a));
      g.addColorStop(0.6, starColor(colorTemp, a * 0.3));
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(sx - r, sy - r, r * 2, r * 2);
    }
  }

  _drawDiffractionSpike(sx, sy, length, brightness, colorTemp) {
    const ctx = this.ctx;
    const a = brightness * 0.18;
    [[0, 1], [1, 0]].forEach(([dx, dy]) => {
      const x1 = sx - length * dx, y1 = sy - length * dy;
      const x2 = sx + length * dx, y2 = sy + length * dy;
      const grad = ctx.createLinearGradient(x1, y1, x2, y2);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(0.44, starColor(colorTemp, a * 0.2));
      grad.addColorStop(0.5, starColor(colorTemp, a));
      grad.addColorStop(0.56, starColor(colorTemp, a * 0.2));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(
        sx - length * dx - 0.35 * dy, sy - length * dy - 0.35 * dx,
        length * 2 * dx + 0.7 * dy, length * 2 * dy + 0.7 * dx
      );
    });
  }

  _drawCoreGlow() {
    const ctx = this.ctx;
    const c = this.preset.coreGlow;
    const cx = this.W * 0.48;
    const cy = this.H * 0.44;
    const size = Math.max(this.W, this.H) * c.sizeRatio;
    const g = ctx.createRadialGradient(cx, cy, size * 0.25, cx, cy, size);
    g.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${c.alpha})`);
    g.addColorStop(0.35, `rgba(${c.r},${c.g},${c.b},${c.alpha * 0.5})`);
    g.addColorStop(0.7, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(cx - size, cy - size, size * 2, size * 2);
  }

  _frame() {
    const ctx = this.ctx;
    const W = this.W, H = this.H;
    const mouseInfluence = 140;
    this.time += 0.016;

    this.mouse.x += (this.mouse.tx - this.mouse.x) * 0.04;
    this.mouse.y += (this.mouse.ty - this.mouse.y) * 0.04;

    ctx.clearRect(0, 0, W, H);
    this._drawCoreGlow();

    // Nebulae
    this.nebulae.forEach(n => {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < -n.size) n.x = W + n.size;
      if (n.x > W + n.size) n.x = -n.size;
      if (n.y < -n.size) n.y = H + n.size;
      if (n.y > H + n.size) n.y = -n.size;
      ctx.globalAlpha = n.alpha;
      ctx.drawImage(n.texture, n.x - n.size / 2, n.y - n.size / 2, n.size, n.size);
      ctx.globalAlpha = 1;
    });

    // Stars
    this.stars.forEach(s => {
      s.x += s.vx;
      s.y += s.vy;
      if (s.x < -30) s.x = W + 30;
      if (s.x > W + 30) s.x = -30;
      if (s.y < -30) s.y = H + 30;
      if (s.y > H + 30) s.y = -30;

      const twinkle = 1 + Math.sin(this.time * s.twinkleSpeed + s.twinklePhase) * s.twinkleAmp;
      const b = s.brightness * twinkle;
      const dx = s.x - this.mouse.x;
      const dy = s.y - this.mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      let mouseBoost = 1;
      if (dist < mouseInfluence) mouseBoost = 1 + (1 - dist / mouseInfluence) * 0.5;

      const ef = this._edgeFade(s.x, s.y);
      const eBrightness = Math.min(1, b * mouseBoost) * ef;
      if (eBrightness < 0.02) return;

      const alpha = 0.12 + eBrightness * 0.88;
      if (s.brightness > 0.50 && ef > 0.15) {
        this._drawStarGlow(s.x, s.y, s.radius * 2, eBrightness, s.colorTemp);
      }
      if (s.brightness > 0.75 && ef > 0.25) {
        this._drawDiffractionSpike(s.x, s.y, s.radius * 8 + eBrightness * 18, eBrightness, s.colorTemp);
      }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius * (0.5 + twinkle * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = starColor(s.colorTemp, alpha);
      ctx.fill();
    });

    // Animate and draw galaxies
    for (const gid of Object.keys(GALAXIES)) {
      const a = galaxyAnim[gid];
      a.currentScale += (a.targetScale - a.currentScale) * 0.03;
      a.currentOpacity += (a.targetOpacity - a.currentOpacity) * 0.03;
      this._drawGalaxy(gid);
    }

    // Mouse halo
    if (this.mouse.x > 0 && this.mouse.y > 0) {
      const g = ctx.createRadialGradient(this.mouse.x, this.mouse.y, 0, this.mouse.x, this.mouse.y, mouseInfluence);
      g.addColorStop(0, 'rgba(180,200,230,0.025)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(this.mouse.x - mouseInfluence, this.mouse.y - mouseInfluence, mouseInfluence * 2, mouseInfluence * 2);
    }
  }

  /* ── Galaxy drawing ── */
  _drawGalaxy(gid) {
    const g = GALAXIES[gid];
    const a = galaxyAnim[gid];
    if (a.currentOpacity < 0.01) return;
    const cx = g.cx * this.W + Math.sin(this.time * 2 * Math.PI / g.floatPeriod + g.floatPhase) * g.floatAmp;
    const cy = g.cy * this.H + Math.cos(this.time * 1.7 * 2 * Math.PI / g.floatPeriod + g.floatPhase) * g.floatAmp;
    const scale = a.currentScale;
    const ctx = this.ctx;
    ctx.save();
    ctx.globalAlpha = a.currentOpacity * (detailGalaxy && detailGalaxy !== gid ? 0.15 : 1);
    const isHovered = hoveredGalaxy === gid && !detailGalaxy;
    const hScale = isHovered ? g.hoverScale : 1;
    const finalScale = scale * hScale;

    // Core glow layers
    for (let i = 3; i >= 0; i--) {
      const r = g.coreRadius * finalScale * (2 + i * 6);
      const alphas = [0.25, 0.1, 0.04, 0.015];
      const grad = ctx.createRadialGradient(cx, cy, g.coreRadius * finalScale * 0.5, cx, cy, r);
      grad.addColorStop(0, `rgba(${g.coreColor[0]},${g.coreColor[1]},${g.coreColor[2]},${alphas[i]})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
    }

    // Core bright point
    ctx.beginPath();
    ctx.arc(cx, cy, g.coreRadius * finalScale * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.min(255,g.coreColor[0]+60)},${Math.min(255,g.coreColor[1]+40)},${Math.min(255,g.coreColor[2]+20)},0.7)`;
    ctx.fill();

    // Galaxy stars
    const stars = this.galaxyStars[gid];
    if (stars) {
      for (const s of stars) {
        const dist = (s.r + (s.clumpExtra ? s.clumpExtraR || 0 : 0)) * finalScale;
        const theta = s.theta + (s.clumpExtra ? s.clumpExtraA || 0 : 0) + this.time * 0.008;
        const sx = cx + Math.cos(theta) * dist + (s.scatter || 0) * finalScale * Math.cos(theta + 1.5);
        const sy = cy + Math.sin(theta) * dist * 0.5 + (s.scatter || 0) * finalScale * 0.3 * Math.sin(theta + 1.5);
        const twinkle = 1 + Math.sin(this.time * s.twinkleSpeed + s.twinklePhase) * 0.3;
        const b = s.brightness * twinkle;
        const alpha = 0.2 + b * 0.6;
        const radius = s.size * finalScale * (0.6 + twinkle * 0.4);

        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(0.3, radius), 0, Math.PI * 2);
        ctx.fillStyle = starColor(s.colorTemp, alpha);
        ctx.fill();

        if (b > 0.7 && radius > 1.2) {
          const gr = ctx.createRadialGradient(sx, sy, 0, sx, sy, radius * 3);
          gr.addColorStop(0, starColor(s.colorTemp, alpha * 0.3));
          gr.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = gr;
          ctx.fillRect(sx - radius * 3, sy - radius * 3, radius * 6, radius * 6);
        }
      }
    }

    // Warp rift + Astronomican pulse for WH40K
    if (g.warpRift && finalScale > 0.3) {
      ctx.save();
      ctx.translate(cx + 25 * finalScale, cy - 15 * finalScale);
      ctx.rotate(0.3);
      ctx.globalAlpha *= 0.12;
      const riftGrad = ctx.createLinearGradient(-50 * finalScale, 0, 50 * finalScale, 0);
      riftGrad.addColorStop(0, 'rgba(0,0,0,0)');
      riftGrad.addColorStop(0.3, 'rgba(120,30,180,0.5)');
      riftGrad.addColorStop(0.5, 'rgba(160,50,200,0.7)');
      riftGrad.addColorStop(0.7, 'rgba(120,30,180,0.5)');
      riftGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = riftGrad;
      ctx.fillRect(-50 * finalScale, -3 * finalScale, 100 * finalScale, 6 * finalScale);
      ctx.restore();

      const pulseAlpha = 0.4 + 0.3 * Math.sin(this.time * 2);
      ctx.beginPath();
      ctx.arc(cx, cy, 3 * finalScale, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240,216,120,${pulseAlpha})`;
      ctx.fill();
      const aglow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 15 * finalScale);
      aglow.addColorStop(0, `rgba(240,216,120,${pulseAlpha * 0.5})`);
      aglow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = aglow;
      ctx.fillRect(cx - 15 * finalScale, cy - 15 * finalScale, 30 * finalScale, 30 * finalScale);
    }

    ctx.restore();
  }

    _start() {
    const loop = () => {
      this._frame();
      this.animId = requestAnimationFrame(loop);
    };
    this.animId = requestAnimationFrame(loop);
  }

  loadPreset(nameOrPreset) {
    this.preset = (typeof nameOrPreset === 'string')
      ? (BG_PRESETS[nameOrPreset] || BG_PRESETS['star-map'])
      : nameOrPreset;
    document.body.style.background = this.preset.baseBackground;
    if (this.W > 0) {
      this._rebuildNebulae();
      this._rebuildStars();
    }
  }

  destroy() {
    if (this.animId) cancelAnimationFrame(this.animId);
    window.removeEventListener('mousemove', this._onMouse);
    window.removeEventListener('resize', this._onResize);
    this.ctx.clearRect(0, 0, this.W, this.H);
  }
}

  /** Switch to a named preset. Future: 'video:path/to/file' or 'image:path/to/file' */
  async switchTo(name) {
    if (name === this._currentName) return;
    this._currentName = name;

    // Future: detect type from name prefix
    // const type = name.startsWith('video:') ? 'video' : name.startsWith('image:') ? 'image' : 'particles';
    const preset = BG_PRESETS[name];
    if (!preset) { console.warn('Unknown background preset:', name); return; }

    // Hide all
    this.videoEl.style.display = 'none'; this.videoEl.pause();
    this.imageEl.style.display = 'none';
    this.canvas.style.display = 'block';

    if (preset.type === 'particles') {
      if (this._active instanceof ParticleBackground) {
        this._active.loadPreset(name);
      } else {
        if (this._active) this._active.destroy();
        this._active = new ParticleBackground(this.canvas, preset);
      }
    }
    // Future video/image branches go here
  },

  /** For world-specific tints: lerp between presets */
  async blendToward(presetAName, presetBName, factor) {
    // Placeholder: for now just switch at threshold
    await this.switchTo(factor > 0.5 ? presetBName : presetAName);
  },

  resize() {
    if (this._active && this._active._resize) this._active._resize();
  },

  destroy() {
    if (this._active) this._active.destroy();
    this._active = null;
  },
};

// Galaxy detail preview renderer (static canvas)
function renderGalaxyPreview(gid) {
  if (!galaxyCtx) return;
  const g = GALAXIES[gid];
  const W = 640, H = 640;
  const cx = W / 2, cy = H / 2;
  galaxyCtx.clearRect(0, 0, W, H);

  // Core glow
  for (let i = 3; i >= 0; i--) {
    const r = g.coreRadius * (3 + i * 8);
    const a = [0.35, 0.15, 0.06, 0.02][i];
    const grad = galaxyCtx.createRadialGradient(cx, cy, g.coreRadius, cx, cy, r);
    grad.addColorStop(0, `rgba(${g.coreColor[0]},${g.coreColor[1]},${g.coreColor[2]},${a})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    galaxyCtx.fillStyle = grad;
    galaxyCtx.fillRect(0, 0, W, H);
  }
  galaxyCtx.beginPath();
  galaxyCtx.arc(cx, cy, g.coreRadius * 0.8, 0, Math.PI * 2);
  galaxyCtx.fillStyle = `rgba(${g.coreColor[0]},${g.coreColor[1]},${g.coreColor[2]},0.9)`;
  galaxyCtx.fill();

  const rng = (seed) => { let s = seed; return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; }; };
  const rand = rng(gid === 'arknights' ? 42 : 137);

  if (g.armCount > 0) {
    for (let arm = 0; arm < g.armCount; arm++) {
      const baseAngle = (arm / g.armCount) * Math.PI * 2;
      for (let i = 0; i < g.armStars / g.armCount; i++) {
        const dist = (rand() * 0.9 + 0.1) * g.armMaxR * 1.8;
        const angle = baseAngle + (dist / (g.armMaxR * 1.8)) * g.armSpiral * Math.PI * 2 + (rand() - 0.5) * 0.8;
        const scatter = (rand() - 0.5) * g.armWidth * (0.3 + dist / (g.armMaxR * 1.8) * 0.7) * 2;
        const px = cx + Math.cos(angle) * dist + (rand() - 0.5) * scatter;
        const py = cy + Math.sin(angle) * dist * 0.5 + (rand() - 0.5) * scatter * 0.3;
        const brightness = rand();
        const r2 = 0.5 + brightness * 2;
        const warmth = rand() < g.warmBias ? 0.4 + rand() * 0.6 : rand() * 0.4;
        const cr = Math.round(140 + warmth * 100);
        const cg = Math.round(140 + warmth * 40 - (1-warmth)*20);
        const cb = Math.round(200 - warmth * 100);
        const alpha = 0.3 + brightness * 0.5;
        galaxyCtx.beginPath();
        galaxyCtx.arc(px, py, r2, 0, Math.PI * 2);
        galaxyCtx.fillStyle = `rgba(${cr},${cg},${cb},${alpha})`;
        galaxyCtx.fill();
      }
    }
  } else {
    const clumpCount = 5;
    for (let c = 0; c < clumpCount; c++) {
      const clumpR = rand() * g.armMaxR;
      const clumpAngle = rand() * Math.PI * 2;
      for (let i = 0; i < g.armStars / clumpCount; i++) {
        const dx = (rand() - 0.5) * g.armWidth * 1.5;
        const dy = (rand() - 0.5) * g.armWidth * 0.8;
        const brightness = rand();
        const r2 = 0.5 + brightness * 1.8;
        const warm = rand() < 0.3;
        const cr = warm ? Math.round(200 + rand()*40) : Math.round(140 + rand()*60);
        const cg = warm ? Math.round(80 + rand()*40) : Math.round(140 + rand()*40);
        const cb = warm ? Math.round(40 + rand()*30) : Math.round(180 + rand()*40);
        galaxyCtx.beginPath();
        galaxyCtx.arc(cx + Math.cos(clumpAngle) * clumpR + dx, cy + Math.sin(clumpAngle) * clumpR * 0.55 + dy, r2, 0, Math.PI * 2);
        galaxyCtx.fillStyle = `rgba(${cr},${cg},${cb},${0.2 + brightness * 0.4})`;
        galaxyCtx.fill();
      }
    }
  }

  if (g.warpRift) {
    galaxyCtx.save();
    galaxyCtx.translate(cx + 30, cy - 20);
    galaxyCtx.rotate(0.3);
    galaxyCtx.globalAlpha = 0.15;
    const riftGrad = galaxyCtx.createLinearGradient(-50, 0, 50, 0);
    riftGrad.addColorStop(0, 'rgba(0,0,0,0)');
    riftGrad.addColorStop(0.3, 'rgba(120,30,180,0.5)');
    riftGrad.addColorStop(0.5, 'rgba(160,50,200,0.7)');
    riftGrad.addColorStop(0.7, 'rgba(120,30,180,0.5)');
    riftGrad.addColorStop(1, 'rgba(0,0,0,0)');
    galaxyCtx.fillStyle = riftGrad;
    galaxyCtx.fillRect(-50, -3, 100, 6);
    galaxyCtx.restore();
  }
  galaxyCtx.beginPath();
  galaxyCtx.arc(cx, cy, 3, 0, Math.PI * 2);
  galaxyCtx.fillStyle = 'rgba(255,240,200,0.8)';
  galaxyCtx.fill();
}

// Galaxy hover detection (runs on each mousemove)
document.addEventListener('mousemove', (e) => {
  if (detailGalaxy) return;
  const bg = BackgroundManager._active;
  if (!bg || !bg.W || !bg.H) return;
  let hit = null;
  for (const gid of Object.keys(GALAXIES)) {
    const g = GALAXIES[gid];
    const a = galaxyAnim[gid];
    if (a.currentOpacity < 0.3) continue;
    const gx = g.cx * bg.W + Math.sin(bg.time * 2 * Math.PI / g.floatPeriod + g.floatPhase) * g.floatAmp;
    const gy = g.cy * bg.H + Math.cos(bg.time * 1.7 * 2 * Math.PI / g.floatPeriod + g.floatPhase) * g.floatAmp;
    const scale = a.currentScale * (hoveredGalaxy === gid ? g.hoverScale : 1);
    const dist = Math.sqrt((e.clientX - gx) ** 2 + (e.clientY - gy) ** 2);
    if (dist < g.hitRadius * scale) { hit = gid; break; }
  }
  if (hit !== hoveredGalaxy) {
    hoveredGalaxy = hit;
    document.body.style.cursor = hit ? 'pointer' : '';
  }
  if (hit) {
    const g = GALAXIES[hit];
    const gx = g.cx * bg.W + Math.sin(bg.time * 2 * Math.PI / g.floatPeriod + g.floatPhase) * g.floatAmp;
    const gy = g.cy * bg.H + Math.cos(bg.time * 1.7 * 2 * Math.PI / g.floatPeriod + g.floatPhase) * g.floatAmp;
    gtName.textContent = g.name;
    gtSub.textContent = g.subtitle;
    galaxyTooltipEl.style.left = Math.min(gx + 60, bg.W - 240) + 'px';
    galaxyTooltipEl.style.top = (gy - 20) + 'px';
    galaxyTooltipEl.classList.add('visible');
  } else {
    galaxyTooltipEl.classList.remove('visible');

});

  // World-specific cover tint
  if (worldId === 'wh40k') {
    cover.style.background = 'radial-gradient(ellipse at 50% 80%, rgba(168,48,48,0.1) 0%, transparent 60%), linear-gradient(180deg, #0a0810 0%, #0a0e18 100%)';
  } else {
    cover.style.background = '';
  }
}

// Back to star map
function returnToStarMap() {
  // Hide galaxy detail if open
  if (detailGalaxy) hideGalaxyDetail();
  if (timeline.classList.contains('active')) {
    timeline.classList.remove('active');
    starMap.classList.remove('hidden');
    BackgroundManager.switchTo('star-map');
    currentBranch = 'mainline';
    currentWorldId = null;
    document.querySelectorAll('.tl-branch-tab').forEach(t => t.classList.remove('active'));
    const mainTab = document.querySelector('[data-branch="mainline"]');
    if (mainTab) mainTab.classList.add('active');
    // Hide timeline-only UI
    eraNav.classList.remove('active');
    backToTopBtn.classList.remove('visible');
    document.getElementById('tl-sub-branches').style.display = 'none';
    VirtualTimeline.clear();
    tlContainer.innerHTML = '';
    // Reset cover style
    document.querySelector('.tl-cover').style.background = '';
  }
}

document.getElementById('nav-star-map').addEventListener('click', (e) => {
  e.preventDefault();
  returnToStarMap();
});

document.getElementById('nav-arknights').addEventListener('click', (e) => {
  e.preventDefault();
  if (currentWorldId === 'arknights') return;
  if (!currentWorldId) { enterWorld('arknights'); return; }
  // Switch world from timeline
  returnToStarMap();
  setTimeout(() => enterWorld('arknights'), 800);
});

document.getElementById('nav-wh40k').addEventListener('click', (e) => {

  if (currentWorldId === 'wh40k') return;
